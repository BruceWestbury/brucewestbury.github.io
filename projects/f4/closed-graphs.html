<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            Closed Graphs &#8212; F&#8324; Series &#8212; Bruce Westbury
        </title>
        <link rel="stylesheet" href="../../assets/css/site.css" />
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [
                        ["\\(", "\\)"],
                        ["$", "$"],
                    ],
                },
            };
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
            async
        ></script>
    </head>
    <body>
        <header id="site-header"></header>

        <div class="page-wrapper">
            <nav id="site-sidebar" class="sidebar"></nav>

            <main class="main-content">
                <div class="content-body">
                    <h1>Closed graphs in the F&#8324; series</h1>

                    <p>
                        Connected simple cubic graphs of girth &#8805; 5, for
                        \(t = 10, 12, 14, 16\) vertices. Evaluations are
                        computed using the F&#8324; pentagon presentation. Data
                        is loaded from cached JSON.
                    </p>

                    <div class="controls">
                        <strong>Vertices:</strong>
                        <button data-t="10">t = 10</button>
                        <button data-t="12">t = 12</button>
                        <button data-t="14">t = 14</button>
                        <button data-t="16">t = 16</button>
                    </div>

                    <p id="status">Choose a value of t.</p>
                    <div id="catalogue" class="catalogue"></div>

                    <nav class="page-nav">
                        <a class="prev" href="index.html">Introduction</a>
                        <a class="next" href="witnesses.html">Witnesses</a>
                    </nav>
                </div>
            </main>
        </div>

        <script>
            window.SITE_ROOT = "../..";
        </script>
        <script src="../../assets/js/site.js"></script>
        <script src="../../assets/js/catalogue.js"></script>
        <script>
            const buttons = document.querySelectorAll("button[data-t]");
            const status = document.getElementById("status");
            const catalogue = document.getElementById("catalogue");

            for (const btn of buttons) {
                btn.addEventListener("click", () => {
                    setActive(btn);
                    load(btn.dataset.t);
                });
            }

            function setActive(active) {
                buttons.forEach((b) =>
                    b.classList.toggle("active", b === active),
                );
            }

            async function load(t) {
                const url = `/projects/f4/cache/closed_t${t}.json`;
                status.textContent = `Loading t = ${t} \u2026`;
                catalogue.innerHTML = "";
                try {
                    const data = await loadJSON(url);
                    const records = data.records || [];
                    status.textContent = `t = ${t}: ${records.length} graph(s)`;
                    for (const r of records)
                        catalogue.appendChild(graphCard(r));
                    retypeset();
                } catch (e) {
                    status.textContent = `Error: ${e.message}`;
                }
            }

            load(10);
            setActive(document.querySelector('button[data-t="10"]'));
        </script>
    </body>
</html>
