<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="520"
    height="420"
    viewBox="0 0 520 420"
    role="img"
    aria-labelledby="title desc"
>
    <title id="title">Freudenthal-Tits magic square logo</title>
    <desc id="desc">
        A four by four magic square labelled by R, C, H, O,
        with entries A1, A2, C3, F4, A5, D6, E6, E7, E8.
    </desc>

    <defs>
        <!-- Main cell gradient. Edit these stops to change the mood. -->
        <linearGradient id="cellGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#eaf4ff"/>
            <stop offset="45%" stop-color="#f5efe4"/>
            <stop offset="100%" stop-color="#f0e7f7"/>
        </linearGradient>

        <!-- Row-label gradient. -->
        <linearGradient id="labelGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#233b63"/>
            <stop offset="100%" stop-color="#4c355f"/>
        </linearGradient>

        <style>
            :root {
                --ink: #17264a;
                --grid: #26385f;
                --paper: #fbfaf7;
                --cell: url(#cellGradient);
                --label: url(#labelGradient);
            }

            .background {
                fill: var(--paper);
            }

            .outer {
                fill: none;
                stroke: var(--grid);
                stroke-width: 3;
                rx: 18;
            }

            .cell {
                fill: var(--cell);
                stroke: var(--grid);
                stroke-width: 1.4;
            }

            .row-label {
                fill: var(--label);
                stroke: var(--paper);
                stroke-width: 1.2;
            }

            .entry {
                fill: var(--ink);
                font-family: "STIX Two Text", "Cambria Math", "Times New Roman", serif;
                font-style: italic;
                font-size: 40px;
                text-anchor: middle;
                dominant-baseline: central;
            }

            .sub {
                font-size: 21px;
                baseline-shift: sub;
            }

            .times {
                font-size: 30px;
                font-style: normal;
            }

            .label-text {
                fill: white;
                font-family: "STIX Two Text", "Cambria Math", "Times New Roman", serif;
                font-style: italic;
                font-size: 42px;
                text-anchor: middle;
                dominant-baseline: central;
            }
        </style>
    </defs>

    <rect class="background" x="0" y="0" width="520" height="420"/>

    <!-- Geometry:
         label column x=40..110
         data columns x=110..480
         rows y=50..370
    -->
    <rect class="outer" x="38" y="48" width="444" height="324"/>

    <!-- Row labels -->
    <rect class="row-label" x="40" y="50" width="70" height="80"/>
    <rect class="row-label" x="40" y="130" width="70" height="80"/>
    <rect class="row-label" x="40" y="210" width="70" height="80"/>
    <rect class="row-label" x="40" y="290" width="70" height="80"/>

    <!-- Data cells -->
    <g>
        <rect class="cell" x="110" y="50" width="92.5" height="80"/>
        <rect class="cell" x="202.5" y="50" width="92.5" height="80"/>
        <rect class="cell" x="295" y="50" width="92.5" height="80"/>
        <rect class="cell" x="387.5" y="50" width="92.5" height="80"/>

        <rect class="cell" x="110" y="130" width="92.5" height="80"/>
        <rect class="cell" x="202.5" y="130" width="92.5" height="80"/>
        <rect class="cell" x="295" y="130" width="92.5" height="80"/>
        <rect class="cell" x="387.5" y="130" width="92.5" height="80"/>

        <rect class="cell" x="110" y="210" width="92.5" height="80"/>
        <rect class="cell" x="202.5" y="210" width="92.5" height="80"/>
        <rect class="cell" x="295" y="210" width="92.5" height="80"/>
        <rect class="cell" x="387.5" y="210" width="92.5" height="80"/>

        <rect class="cell" x="110" y="290" width="92.5" height="80"/>
        <rect class="cell" x="202.5" y="290" width="92.5" height="80"/>
        <rect class="cell" x="295" y="290" width="92.5" height="80"/>
        <rect class="cell" x="387.5" y="290" width="92.5" height="80"/>
    </g>

    <!-- Row labels -->
    <text class="label-text" x="75" y="90">R</text>
    <text class="label-text" x="75" y="170">C</text>
    <text class="label-text" x="75" y="250">H</text>
    <text class="label-text" x="75" y="330">O</text>

    <!-- Row R -->
    <text class="entry" x="156.25" y="90">A<tspan class="sub">1</tspan></text>
    <text class="entry" x="248.75" y="90">A<tspan class="sub">2</tspan></text>
    <text class="entry" x="341.25" y="90">C<tspan class="sub">3</tspan></text>
    <text class="entry" x="433.75" y="90">F<tspan class="sub">4</tspan></text>

    <!-- Row C -->
    <text class="entry" x="156.25" y="170">A<tspan class="sub">2</tspan></text>
    <text class="entry" x="248.75" y="170">
        A<tspan class="sub">2</tspan>
        <tspan class="times">×</tspan>
        A<tspan class="sub">2</tspan>
    </text>
    <text class="entry" x="341.25" y="170">A<tspan class="sub">5</tspan></text>
    <text class="entry" x="433.75" y="170">E<tspan class="sub">6</tspan></text>

    <!-- Row H -->
    <text class="entry" x="156.25" y="250">C<tspan class="sub">3</tspan></text>
    <text class="entry" x="248.75" y="250">A<tspan class="sub">5</tspan></text>
    <text class="entry" x="341.25" y="250">D<tspan class="sub">6</tspan></text>
    <text class="entry" x="433.75" y="250">E<tspan class="sub">7</tspan></text>

    <!-- Row O -->
    <text class="entry" x="156.25" y="330">F<tspan class="sub">4</tspan></text>
    <text class="entry" x="248.75" y="330">E<tspan class="sub">6</tspan></text>
    <text class="entry" x="341.25" y="330">E<tspan class="sub">7</tspan></text>
    <text class="entry" x="433.75" y="330">E<tspan class="sub">8</tspan></text>
</svg>
