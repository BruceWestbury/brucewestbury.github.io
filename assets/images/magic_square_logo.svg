<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="520"
    height="420"
    viewBox="0 0 520 420"
    role="img"
    aria-labelledby="ms-title ms-desc"
>
    <title id="ms-title">Freudenthal&#8211;Tits magic square</title>
    <desc id="ms-desc">
        A four by four magic square labelled by R, C, H, O,
        with entries A1, A2, C3, F4, A2&#xD7;A2, A5, E6, D6, E7, E8.
    </desc>

    <defs>
        <linearGradient id="cellGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#eaf4ff"/>
            <stop offset="45%"  stop-color="#f5efe4"/>
            <stop offset="100%" stop-color="#f0e7f7"/>
        </linearGradient>
        <linearGradient id="labelGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#233b63"/>
            <stop offset="100%" stop-color="#4c355f"/>
        </linearGradient>

        <style>
            .entry {
                font-family: "STIX Two Text", "Cambria Math", "Times New Roman", serif;
                font-style: italic;
                font-size: 40px;
                text-anchor: middle;
                dominant-baseline: central;
            }
            .sub   { font-size: 21px; baseline-shift: sub; }
            .times { font-size: 30px; font-style: normal; }
            .lbl   {
                font-family: "STIX Two Text", "Cambria Math", "Times New Roman", serif;
                font-style: italic;
                font-size: 42px;
                text-anchor: middle;
                dominant-baseline: central;
            }
        </style>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="520" height="420" fill="#fbfaf7"/>

    <!-- Outer border -->
    <rect x="38" y="48" width="444" height="324"
          fill="none" stroke="#26385f" stroke-width="3" rx="18"/>

    <!-- Row label cells -->
    <rect x="40" y="50"  width="70" height="80" fill="url(#labelGrad)" stroke="#fbfaf7" stroke-width="1.2"/>
    <rect x="40" y="130" width="70" height="80" fill="url(#labelGrad)" stroke="#fbfaf7" stroke-width="1.2"/>
    <rect x="40" y="210" width="70" height="80" fill="url(#labelGrad)" stroke="#fbfaf7" stroke-width="1.2"/>
    <rect x="40" y="290" width="70" height="80" fill="url(#labelGrad)" stroke="#fbfaf7" stroke-width="1.2"/>

    <!-- Data cells — row R -->
    <rect x="110"   y="50"  width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="202.5" y="50"  width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="295"   y="50"  width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="387.5" y="50"  width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <!-- row C -->
    <rect x="110"   y="130" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="202.5" y="130" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="295"   y="130" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="387.5" y="130" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <!-- row H -->
    <rect x="110"   y="210" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="202.5" y="210" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="295"   y="210" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="387.5" y="210" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <!-- row O -->
    <rect x="110"   y="290" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="202.5" y="290" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="295"   y="290" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>
    <rect x="387.5" y="290" width="92.5" height="80" fill="url(#cellGrad)" stroke="#26385f" stroke-width="1.4"/>

    <!-- Row labels -->
    <text class="lbl" fill="white" x="75" y="90">R</text>
    <text class="lbl" fill="white" x="75" y="170">C</text>
    <text class="lbl" fill="white" x="75" y="250">H</text>
    <text class="lbl" fill="white" x="75" y="330">O</text>

    <!-- Row R entries -->
    <text class="entry" fill="#17264a" x="156.25" y="90">A<tspan class="sub">1</tspan></text>
    <text class="entry" fill="#17264a" x="248.75" y="90">A<tspan class="sub">2</tspan></text>
    <text class="entry" fill="#17264a" x="341.25" y="90">C<tspan class="sub">3</tspan></text>
    <text class="entry" fill="#17264a" x="433.75" y="90">F<tspan class="sub">4</tspan></text>

    <!-- Row C entries -->
    <text class="entry" fill="#17264a" x="156.25" y="170">A<tspan class="sub">2</tspan></text>
    <text class="entry" fill="#17264a" x="248.75" y="170">A<tspan class="sub">2</tspan><tspan class="times">&#215;</tspan>A<tspan class="sub">2</tspan></text>
    <text class="entry" fill="#17264a" x="341.25" y="170">A<tspan class="sub">5</tspan></text>
    <text class="entry" fill="#17264a" x="433.75" y="170">E<tspan class="sub">6</tspan></text>

    <!-- Row H entries -->
    <text class="entry" fill="#17264a" x="156.25" y="250">C<tspan class="sub">3</tspan></text>
    <text class="entry" fill="#17264a" x="248.75" y="250">A<tspan class="sub">5</tspan></text>
    <text class="entry" fill="#17264a" x="341.25" y="250">D<tspan class="sub">6</tspan></text>
    <text class="entry" fill="#17264a" x="433.75" y="250">E<tspan class="sub">7</tspan></text>

    <!-- Row O entries -->
    <text class="entry" fill="#17264a" x="156.25" y="330">F<tspan class="sub">4</tspan></text>
    <text class="entry" fill="#17264a" x="248.75" y="330">E<tspan class="sub">6</tspan></text>
    <text class="entry" fill="#17264a" x="341.25" y="330">E<tspan class="sub">7</tspan></text>
    <text class="entry" fill="#17264a" x="433.75" y="330">E<tspan class="sub">8</tspan></text>
</svg>
